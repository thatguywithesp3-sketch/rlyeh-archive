<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>R'LYEH ARCHIVE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
      }
    </style>
    <!--
      GitHub Pages single-page-app redirect.
      Rewrites a deep-link path into a query string the app can decode on load,
      so refreshing /R-LYEH-ARCHIVE/archive (etc.) doesn't 404.
      pathSegmentsToKeep = 1 keeps the "/R-LYEH-ARCHIVE" project base.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
